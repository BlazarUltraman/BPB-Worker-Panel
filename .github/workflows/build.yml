name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch:          # 手动触发
  schedule:
    - cron: '0 */1 * * *'     # 每小时自动运行（仅在默认分支）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: npm ci --production   # 更稳定，建议用 ci

      - name: Type check & Build
        run: |
          npm run check
          npm run build

      - name: Read release notes
        id: release_note
        run: |
          # 使用 heredoc 方式安全传递多行内容
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          cat RELEASE.md >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          tag: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          overwrite: true
          file_glob: true
          body: ${{ steps.release_note.outputs.body }}
          # 去除了 prerelease, promote, make_latest 等容易混淆的参数，
          # 默认行为：如果 tag 已存在则覆盖，release 为最新（latest）
